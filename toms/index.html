<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actor Filmography Tube Map</title>
  <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f0f0f0;
      --surface:      #ffffff;
      --text:         #1a1a1a;
      --text-muted:   #595959;
      --border-col:   #cccccc;
      --focus:        #005fcc;
      --focus-ring:   0 0 0 3px #005fcc;
      --radius:       8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #141414;
        --surface:    #242424;
        --text:       #e8e8e8;
        --text-muted: #a0a0a0;
        --border-col: #3a3a3a;
        --focus:      #4da6ff;
        --focus-ring: 0 0 0 3px #4da6ff;
      }
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Skip link ───────────────────────────────────────── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 16px;
      background: var(--focus);
      color: #fff;
      padding: 10px 18px;
      border-radius: 0 0 var(--radius) var(--radius);
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
      transition: top 0.15s;
    }
    .skip-link:focus { top: 0; outline: none; box-shadow: var(--focus-ring); }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border-col);
      padding: 16px 24px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Main layout ─────────────────────────────────────── */
    main { padding: 24px; max-width: 1600px; }

    /* ── Diagram section ─────────────────────────────────── */
    #diagram-figure { margin: 0 0 24px; }

    #diagram-caption {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    #diagram-container {
      background: var(--surface);
      border: 1px solid var(--border-col);
      border-radius: var(--radius);
      overflow: auto;
      max-height: calc(100vh - 260px);
      padding: 0;
    }

    #diagram-svg { display: block; }

    /* SVG text inherits colour from CSS custom props */
    #diagram-svg text.label-film  { fill: var(--text); font-size: 11px; }
    #diagram-svg text.label-year  { fill: var(--text-muted); font-size: 10px; }
    #diagram-svg text.label-actor { font-size: 13px; font-weight: 700; }

    /* Interchange node colours (adapt to dark mode via CSS vars) */
    .interchange-ring   { fill: var(--text); }
    .interchange-center { fill: var(--surface); stroke: var(--text); stroke-width: 2; }

    /* Station interactive states */
    .station {
      cursor: pointer;
    }
    .station:focus { outline: none; }
    .station:focus .station-hit,
    .station:hover .station-hit {
      opacity: 1;
    }
    .station-hit {
      fill: transparent;
      opacity: 0;
    }
    .station:focus-visible .station-focus-ring,
    .station:focus .station-focus-ring {
      display: block;
    }
    .station-focus-ring { display: none; }

    /* ── Legend ──────────────────────────────────────────── */
    #legend {
      background: var(--surface);
      border: 1px solid var(--border-col);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    #legend h2 { font-size: 0.9rem; font-weight: 700; text-transform: uppercase;
                 letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
    .legend-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .legend-swatch {
      display: inline-block;
      width: 36px;
      height: 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── Data table section ──────────────────────────────── */
    #table-section { margin-bottom: 24px; }

    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border-col);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s;
    }
    .toggle-btn:hover { background: var(--bg); }
    .toggle-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .toggle-btn .toggle-icon { font-size: 0.75rem; transition: transform 0.2s; }
    .toggle-btn[aria-expanded="true"] .toggle-icon { transform: rotate(90deg); }

    #data-table-wrapper { margin-top: 12px; overflow-x: auto; }

    #data-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.875rem;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border-col);
    }
    #data-table th, #data-table td {
      text-align: left;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-col);
    }
    #data-table th {
      font-weight: 600;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #data-table tbody tr:last-child td { border-bottom: none; }
    #data-table tbody tr:hover td { background: var(--bg); }
    .shared-badge {
      display: inline-block;
      background: var(--focus);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Film detail dialog ──────────────────────────────── */
    #film-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    #film-detail-overlay[hidden] { display: none; }

    #film-detail {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 420px;
      width: 100%;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    #film-detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border-col);
      border-radius: 6px;
      font-size: 1.1rem;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }
    #film-detail-close:hover { background: var(--bg); }
    #film-detail-close:focus-visible { outline: none; box-shadow: var(--focus-ring); }

    #film-detail-title {
      font-size: 1.25rem;
      font-weight: 700;
      padding-right: 40px;
      margin-bottom: 4px;
    }
    #film-detail-year {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    #film-detail-actors-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    #film-detail-actors { list-style: none; }
    #film-detail-actors li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border-col);
    }
    #film-detail-actors li:last-child { border-bottom: none; }
    .actor-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Reduced motion ──────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header>
    <h1 id="page-title">Actor Filmography Tube Map</h1>
    <p id="page-subtitle"></p>
  </header>

  <main id="main-content" tabindex="-1">

    <figure id="diagram-figure" aria-labelledby="diagram-caption">
      <figcaption id="diagram-caption"></figcaption>
      <div id="diagram-container"
           role="region"
           aria-label="Filmography tube map — scroll horizontally to see all films">
        <!-- SVG injected by JavaScript -->
      </div>
    </figure>

    <nav id="legend" aria-label="Actor routes">
      <h2>Routes</h2>
      <ul class="legend-list" id="legend-list"></ul>
    </nav>

    <section id="table-section" aria-labelledby="table-heading">
      <h2 id="table-heading" class="sr-only">Film data table</h2>
      <button class="toggle-btn"
              id="table-toggle"
              aria-expanded="false"
              aria-controls="data-table-wrapper">
        <span class="toggle-icon" aria-hidden="true">▶</span>
        Show full data table
      </button>
      <div id="data-table-wrapper" hidden>
        <table id="data-table" aria-label="All films and actors">
          <thead>
            <tr>
              <th scope="col">Film</th>
              <th scope="col">Year</th>
              <th scope="col">Actor(s)</th>
            </tr>
          </thead>
          <tbody id="data-table-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Film detail dialog -->
  <div id="film-detail-overlay" hidden>
    <div id="film-detail"
         role="dialog"
         aria-modal="true"
         aria-labelledby="film-detail-title">
      <button id="film-detail-close" aria-label="Close film details">✕</button>
      <h2 id="film-detail-title"></h2>
      <p id="film-detail-year"></p>
      <p id="film-detail-actors-label">Featuring</p>
      <ul id="film-detail-actors" aria-label="Actors in this film"></ul>
    </div>
  </div>

  <!-- Visually-hidden utility (for sr-only) -->
  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>

    function segStr(x1, y1, x2, y2) {
      const dx = Math.abs(x2 - x1);
      const dy = y2 - y1;
      if (dx < 1) return `L ${x2} ${y2}`;           // purely vertical
      if (dy <= dx) return `L ${x2} ${y2}`;          // steep: straight diagonal
      const v = (dy - dx) / 2;
      return `L ${x1} ${y1 + v} L ${x2} ${y2 - v} L ${x2} ${y2}`;
    }

    /* Build an SVG path string with 45° kinks */
    function tubePath(pts) {
      if (pts.length === 0) return '';
      let d = `M ${pts[0].x} ${pts[0].y}`;
      for (let i = 1; i < pts.length; i++) {
        const x1 = pts[i-1].x, y1 = pts[i-1].y;
        const x2 = pts[i].x,   y2 = pts[i].y;
        d += ` ${segStr(x1, y1, x2, y2)}`;
      }
      return d;
    }

    /* ── Build SVG ─────────────────────────────────────────────────── */
    const svg = svgEl('svg', {
      id:          'diagram-svg',
      viewBox:     `0 0 ${svgW} ${svgH}`,
      width:       svgW,
      height:      svgH,
      role:        'img',
      'aria-labelledby': 'svg-title svg-desc',
      focusable:   'false',
    });

    /* Accessible title + description */
    const sharedFilms = films.filter(f => f.actors.length > 1);
    const actorNames  = actors.map(a => a.name).join(', ');

    const svgTitleEl = svgEl('title', { id: 'svg-title' });
    svgTitleEl.textContent = 'Actor Filmography Tube Map';
    svg.appendChild(svgTitleEl);

    const svgDescEl = svgEl('desc', { id: 'svg-desc' });
    svgDescEl.textContent =
      `Tube map showing filmographies of ${actorNames}. ` +
      `${films.length} films shown across ${actors.length} routes. ` +
      (sharedFilms.length
        ? `${sharedFilms.length} shared film${sharedFilms.length > 1 ? 's' : ''}: ` +
          sharedFilms.map(f => `${f.title} (${f.year})`).join(', ') + '.'
        : 'No films shared between actors.');
    svg.appendChild(svgDescEl);

    /* ── Detect overlap runs (consecutive films shared between same pair of actors) ── */
    /* For each pair of actors, find consecutive films they both appear in.
       If found, offset them to show side-by-side instead of overlapping. */
    const offsetMap = new Map(); // filmId -> [{actorIdx, offsetX}, ...]
    const OVERLAP_OFFSET = 35; // pixels to offset when paths overlap

    // For each pair of actors
    for (let a1 = 0; a1 < actors.length; a1++) {
      for (let a2 = a1 + 1; a2 < actors.length; a2++) {
        // Find films both actors appear in, sorted by year and title
        const bothInFilms = films
          .filter(f => f.actors.includes(a1) && f.actors.includes(a2))
          .sort((a, b) => a.year - b.year || a.title.localeCompare(b.title));

        if (bothInFilms.length < 2) continue;

        // Check for consecutive pairs in THEIR shared films (not global)
        for (let i = 0; i < bothInFilms.length - 1; i++) {
          const film1 = bothInFilms[i];
          const film2 = bothInFilms[i + 1];

          // These are consecutive in the shared films, so offset them
          if (!offsetMap.has(film1.id)) offsetMap.set(film1.id, []);
          if (!offsetMap.has(film2.id)) offsetMap.set(film2.id, []);

          // Determine offset directions: lower index = left, higher = right
          const offsetX1 = a1 < a2 ? -OVERLAP_OFFSET : OVERLAP_OFFSET;
          const offsetX2 = a2 > a1 ? OVERLAP_OFFSET : -OVERLAP_OFFSET;

          offsetMap.get(film1.id).push({ actorIdx: a1, offsetX: offsetX1 });
          offsetMap.get(film1.id).push({ actorIdx: a2, offsetX: offsetX2 });
          offsetMap.get(film2.id).push({ actorIdx: a1, offsetX: offsetX1 });
          offsetMap.get(film2.id).push({ actorIdx: a2, offsetX: offsetX2 });

          console.log(`✓ ${actors[a1].name} + ${actors[a2].name}: "${film1.title}" → "${film2.title}"`);
        }
      }
    }

    console.log('offsetMap:', offsetMap);

    /* ── Actor route paths (vertical, with 45° kinks and offsets for overlaps) ── */
    for (const actor of actors) {
      const myFilms = films
        .filter(f => f.actors.includes(actor.index))
        .sort((a, b) => filmY(a) - filmY(b));
      if (myFilms.length < 1) continue;

      /* Build path with offsets for overlapping segments */
      const pts = [];
      const connectors = []; // Thin lines from offset path to actual node

      for (const film of myFilms) {
        const baseX = nodeX(film);
        let x = baseX;
        const y = filmY(film);

        /* Check if this actor's path should be offset at this film */
        if (offsetMap.has(film.id)) {
          for (const entry of offsetMap.get(film.id)) {
            if (entry.actorIdx === actor.index) {
              x = baseX + entry.offsetX;
              /* Record connector line from offset path to actual node */
              connectors.push({
                fromX: x,
                fromY: y,
                toX: baseX,
                toY: y,
              });
              break;
            }
          }
        }

        pts.push({ x, y });
      }

      /* Draw the main route path */
      if (pts.length >= 2) {
        svg.appendChild(svgEl('path', {
          d:                tubePath(pts),
          fill:             'none',
          stroke:           actor.color,
          'stroke-width':   LINE_W,
          'stroke-linecap': 'round',
          'stroke-linejoin':'round',
          'aria-hidden':    'true',
        }));
      }

      /* Draw thin connector lines from offset path to actual node */
      for (const conn of connectors) {
        svg.appendChild(svgEl('line', {
          x1:            conn.fromX,
          y1:            conn.fromY,
          x2:            conn.toX,
          y2:            conn.toY,
          stroke:        actor.color,
          'stroke-width': 1.5,
          'opacity':     '0.6',
          'aria-hidden': 'true',
        }));
      }

      /* Actor name label at the top of their column */
      svg.appendChild(svgText({
        x:             actorX(actor.index),
        y:             PAD.top - 18,
        'text-anchor': 'middle',
        class:         'label-actor',
        fill:          actor.color,
        'aria-hidden': 'true',
      }, actor.name));
    }

    /* ── Station nodes — one node per film ─────────────────────────── */
    const stationEls = []; // [{group, film}] for event wiring

    films.forEach((film, rowIdx) => {
      const x        = nodeX(film);
      const y        = filmY(film);
      const isShared = film.actors.length > 1;
      const or       = outerR(film);

      /* One interactive group per film */
      const group = svgEl('g', {
        class:        'station',
        role:         'button',
        tabindex:     '0',
        'aria-label': `${film.title}, ${film.year}` +
                      (isShared
                        ? `. Interchange — shared by: ${film.actors.map(i => actors[i].name).join(' and ')}`
                        : `. ${actors[film.actors[0]].name}`),
        'data-film-id': String(film.id),
      });

      /* Hit area */
      group.appendChild(svgEl('rect', {
        class:  'station-hit',
        x:      x - 28,
        y:      y - 28,
        width:  56,
        height: 56,
        rx:     8,
      }));

      if (isShared) {
        group.appendChild(svgEl('circle', {
          cx: x, cy: y, r: or,
          class:         'interchange-ring',
          'aria-hidden': 'true',
        }));
        group.appendChild(svgEl('circle', {
          cx: x, cy: y, r: R_INTER,
          class:         'interchange-center',
          'aria-hidden': 'true',
        }));
      } else {
        const actor = actors[film.actors[0]];
        group.appendChild(svgEl('circle', {
          cx: x, cy: y, r: R,
          fill:           'var(--surface)',
          stroke:         actor.color,
          'stroke-width': 3,
          class:          'station-circle',
          'aria-hidden':  'true',
        }));
      }

      /* Focus ring */
      group.appendChild(svgEl('circle', {
        cx: x, cy: y,
        r:              or + 6,
        fill:           'none',
        stroke:         'var(--focus)',
        'stroke-width': 2.5,
        class:          'station-focus-ring',
        'aria-hidden':  'true',
      }));

      /* Film label — alternate left/right to avoid overlap.
         Even rows: label to the left; odd rows: label to the right. */
      const toRight  = (rowIdx % 2 !== 0);
      const labelX   = toRight ? x + or + LABEL_GAP : x - or - LABEL_GAP;
      const anchor   = toRight ? 'start' : 'end';

      group.appendChild(svgText({
        x: labelX, y: y - 4,
        'text-anchor':       anchor,
        'dominant-baseline': 'auto',
        class:               'label-film',
        'font-weight':       isShared ? '700' : '400',
        'aria-hidden':       'true',
      }, truncate(film.title, 26)));

      group.appendChild(svgText({
        x: labelX, y: y + 11,
        'text-anchor':       anchor,
        'dominant-baseline': 'auto',
        class:               'label-year',
        'aria-hidden':       'true',
      }, String(film.year)));

      svg.appendChild(group);
      stationEls.push({ group, film });
    });

    /* ── Insert SVG into page ──────────────────────────────────────── */
    document.getElementById('diagram-container').appendChild(svg);

    /* ── Page header subtitle ──────────────────────────────────────── */
    const subtitle = document.getElementById('page-subtitle');
    subtitle.textContent =
      `${actors.map(a => a.name).join(' · ')} — ${films.length} films`;

    /* ── Figcaption ────────────────────────────────────────────────── */
    const caption = document.getElementById('diagram-caption');
    caption.textContent =
      `${films.length} film${films.length !== 1 ? 's' : ''} across ` +
      `${actors.length} actor${actors.length !== 1 ? 's' : ''}. ` +
      (sharedFilms.length
        ? `${sharedFilms.length} shared interchange${sharedFilms.length > 1 ? 's' : ''}: ` +
          sharedFilms.map(f => `${f.title} (${f.year})`).join(', ') + '.'
        : 'No shared films found.');

    /* ── Legend ────────────────────────────────────────────────────── */
    const legendList = document.getElementById('legend-list');
    for (const actor of actors) {
      const li      = document.createElement('li');
      li.className  = 'legend-item';

      const swatch  = document.createElement('span');
      swatch.className = 'legend-swatch';
      swatch.style.background = actor.color;
      swatch.setAttribute('aria-hidden', 'true');

      const label   = document.createElement('span');
      label.textContent = actor.name;

      li.appendChild(swatch);
      li.appendChild(label);
      legendList.appendChild(li);
    }

    /* ── Data table ────────────────────────────────────────────────── */
    const tbody = document.getElementById('data-table-body');
    for (const film of films) {
      const tr = document.createElement('tr');

      const tdTitle = document.createElement('td');
      tdTitle.textContent = film.title;
      if (film.actors.length > 1) {
        const badge = document.createElement('span');
        badge.className = 'shared-badge';
        badge.textContent = 'shared';
        tdTitle.appendChild(badge);
      }

      const tdYear  = document.createElement('td');
      tdYear.textContent = String(film.year);

      const tdActors = document.createElement('td');
      tdActors.textContent = film.actors.map(i => actors[i].name).join(', ');

      tr.append(tdTitle, tdYear, tdActors);
      tbody.appendChild(tr);
    }

    /* ── Table toggle ──────────────────────────────────────────────── */
    const toggleBtn     = document.getElementById('table-toggle');
    const tableWrapper  = document.getElementById('data-table-wrapper');

    toggleBtn.addEventListener('click', () => {
      const open = toggleBtn.getAttribute('aria-expanded') === 'true';
      toggleBtn.setAttribute('aria-expanded', String(!open));
      toggleBtn.querySelector('.toggle-icon').textContent = open ? '▶' : '▼';
      toggleBtn.childNodes[1].nodeValue = open ? ' Show full data table' : ' Hide full data table';
      tableWrapper.hidden = open;
    });

    /* ── Film detail modal ─────────────────────────────────────────── */
    const overlay      = document.getElementById('film-detail-overlay');
    const dialog       = document.getElementById('film-detail');
    const closeBtn     = document.getElementById('film-detail-close');
    const detailTitle  = document.getElementById('film-detail-title');
    const detailYear   = document.getElementById('film-detail-year');
    const detailActors = document.getElementById('film-detail-actors');

    let lastTrigger = null;

    function openModal(film, trigger) {
      lastTrigger = trigger;

      detailTitle.textContent = film.title;
      detailYear.textContent  = `Released ${film.year}`;

      detailActors.innerHTML = '';
      for (const idx of film.actors) {
        const actor = actors[idx];
        const li    = document.createElement('li');

        const dot   = document.createElement('span');
        dot.className = 'actor-dot';
        dot.style.background = actor.color;
        dot.setAttribute('aria-hidden', 'true');

        const name  = document.createElement('span');
        name.textContent = actor.name;

        li.appendChild(dot);
        li.appendChild(name);
        detailActors.appendChild(li);
      }

      overlay.hidden = false;
      closeBtn.focus();
    }

    function closeModal() {
      overlay.hidden = true;
      if (lastTrigger) lastTrigger.focus();
    }

    closeBtn.addEventListener('click', closeModal);

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });

    /* Keyboard: Escape closes; Tab is trapped inside dialog */
    document.addEventListener('keydown', e => {
      if (overlay.hidden) return;
      if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
      if (e.key !== 'Tab') return;

      const focusable = Array.from(
        dialog.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')
      ).filter(el => !el.disabled);

      if (!focusable.length) return;
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];

      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    });

    /* ── Station interactions ──────────────────────────────────────── */
    for (const { group, film } of stationEls) {
      group.addEventListener('click', () => openModal(film, group));
      group.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(film, group);
        }
      });
    }

    /* ── Arrow-key navigation between stations ─────────────────────── */
    // Roving focus: up/down arrows move between stations in chronological order
    svg.addEventListener('keydown', e => {
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
      const current = document.activeElement;
      const allStations = stationEls.map(s => s.group);
      const idx = allStations.indexOf(current);
      if (idx === -1) return;
      e.preventDefault();
      const next = e.key === 'ArrowDown'
        ? allStations[Math.min(idx + 1, allStations.length - 1)]
        : allStations[Math.max(idx - 1, 0)];
      next.focus();
      next.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
    });

  }());
  </script>

</body>
