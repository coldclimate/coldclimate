        --text: #e8f0ff;
        --text-muted: #9fb3d5;
      }

    body {

      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Static background stars (performance: no animation) */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:

      background-size: 100% 100%;
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
    }

    header {
      background: rgba(13, 20, 34, 0.7);
      border-bottom: 2px solid rgba(100, 150, 255, 0.3);
      padding: 20px 24px;
      position: relative;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    main {
      padding: 32px 24px;
      max-width: 100%;
      position: relative;
      z-index: 5;
    }

    figure { margin: 0 0 32px; }

    figcaption {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #diagram-container {
      background: radial-gradient(ellipse at 30% 40%, rgba(20, 40, 80, 0.8), rgba(10, 14, 39, 0.95));
      border: 2px solid rgba(100, 150, 255, 0.4);
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow:
        inset 0 0 30px rgba(100, 150, 255, 0.1),
        0 0 40px rgba(50, 100, 200, 0.3);
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
    }

    #graph .link {
      stroke: rgba(100, 150, 255, 0.2);
      stroke-width: 1.5px;
    }

    #graph .node-circle {
      cursor: grab;
      transition: opacity 0.15s ease;
    }

    #graph .node-circle:hover {
      cursor: grabbing;
      opacity: 0.9;
    }

    #graph .node-label {
      font-size: 11px;
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: rgba(224, 232, 255, 0.9);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }

    .tooltip {
      position: absolute;
      background: rgba(13, 20, 34, 0.95);
      color: #e0e8ff;
      padding: 10px 14px;
      border: 1px solid rgba(100, 150, 255, 0.5);
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(100, 150, 255, 0.4);
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }

    nav {
      background: rgba(13, 20, 34, 0.7);
      border: 2px solid rgba(100, 150, 255, 0.3);
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    nav h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 16px;
      letter-spacing: 1px;
      color: rgba(100, 180, 255, 0.9);
      text-shadow: 0 0 8px rgba(100, 150, 255, 0.3);
    }

    .legend-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 28px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .legend-swatch {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(100, 150, 255, 0.4);
      box-shadow: 0 0 12px currentColor;
      flex-shrink: 0;
    }
  </style>
</head>

, {"source": "f1205143", "target": "f31008", "actorIndex": 10, "color": "#B5006B"}, {"source": "f31008", "target": "f10994", "actorIndex": 10, "color": "#B5006B"}, {"source": "f10994", "target": "f292384", "actorIndex": 10, "color": "#B5006B"}, {"source": "f292384", "target": "f14207", "actorIndex": 10, "color": "#B5006B"}, {"source": "f14207", "target": "f73511", "actorIndex": 10, "color": "#B5006B"}, {"source": "f73511", "target": "f14208", "actorIndex": 10, "color": "#B5006B"}, {"source": "f14208", "target": "f20263", "actorIndex": 10, "color": "#B5006B"}, {"source": "f20263", "target": "f14637", "actorIndex": 10, "color": "#B5006B"}, {"source": "f14637", "target": "f14728", "actorIndex": 10, "color": "#B5006B"}, {"source": "f14728", "target": "f10523", "actorIndex": 10, "color": "#B5006B"}, {"source": "f10523", "target": "f100757", "actorIndex": 10, "color": "#B5006B"}, {"source": "f100757", "target": "f47058", "actorIndex": 10, "color": "#B5006B"}, {"source": "f47058", "target": "f217719", "actorIndex": 10, "color": "#B5006B"}, {"source": "f217719", "target": "f1198450", "actorIndex": 10, "color": "#B5006B"}, {"source": "f1198450", "target": "f324314", "actorIndex": 10, "color": "#B5006B"}, {"source": "f324314", "target": "f289716", "actorIndex": 10, "color": "#B5006B"}, {"source": "f289716", "target": "f390061", "actorIndex": 10, "color": "#B5006B"}, {"source": "f390061", "target": "f469035", "actorIndex": 10, "color": "#B5006B"}, {"source": "f469035", "target": "f1014063", "actorIndex": 10, "color": "#B5006B"}, {"source": "f1014063", "target": "f1482396", "actorIndex": 10, "color": "#B5006B"}]};

  const tooltip = document.getElementById('tooltip');

  // Extract data
  const actors = GRAPH_DATA.actors;
  const films = GRAPH_DATA.nodes;
  const sharedFilms = films.filter(f => f.shared).length;

  // Update header
  if (actors.length > 0) {
    document.getElementById('page-subtitle').textContent = actors.map(a => a.name).join(' · ');
  }

  // Build legend
  const legendList = document.getElementById('legend-list');
  actors.forEach(actor => {
    const li = document.createElement('li');
    li.className = 'legend-item';
    li.innerHTML = `<span class="legend-swatch" style="background: ${actor.color}"></span><span>${actor.name}</span>`;
    legendList.appendChild(li);
  });

  // Update caption
  document.getElementById('diagram-caption').textContent = `${films.length} films, ${sharedFilms} shared`;

  // D3 Force Graph
  const width = document.getElementById('diagram-container').clientWidth;
  const height = document.getElementById('diagram-container').clientHeight;

  const svg = d3.select('#graph')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');

  // Create force simulation with optimized parameters
  const simulation = d3.forceSimulation(GRAPH_DATA.nodes)
    .force('link', d3.forceLink(GRAPH_DATA.links)
      .id(d => d.id)
      .distance(80)
      .strength(0.4)
    )
    .force('charge', d3.forceManyBody().strength(-250).distanceMax(300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide().radius(d => {
      return d.type === 'actor' ? 25 : 12;
    }).strength(0.8))
    .alphaDecay(0.03)
    .velocityDecay(0.3);

  // Draw links (colored by actor chain, with arrowheads for chronological direction)
  const link = g.selectAll('.link')
    .data(GRAPH_DATA.links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 2)
    .attr('marker-end', d => `url(#arrow-${d.color.substring(1)})`);

  // Draw nodes
  const node = g.selectAll('.node')
    .data(GRAPH_DATA.nodes)
    .join('g')
    .attr('class', 'node');

  // Create a defs section for link arrowheads
  const defs = svg.append('defs');

  // Create arrowhead markers for chronological direction
  const uniqueColors = new Set(GRAPH_DATA.links.map(l => l.color));
  uniqueColors.forEach(color => {
    const marker = defs.append('marker')
      .attr('id', `arrow-${color.substring(1)}`)
      .attr('markerWidth', 10)
      .attr('markerHeight', 10)
      .attr('refX', 8)
      .attr('refY', 3)
      .attr('orient', 'auto')
      .attr('markerUnits', 'strokeWidth');
    marker.append('path')
      .attr('d', 'M0,0 L0,6 L9,3 z')
      .attr('fill', color);
  });

  // Precompute film colors based on which actors appear in them
  const filmColors = new Map();
  const filmActorChains = new Map();  // film id → array of actor colors that pass through

  // Build a map of which actors appear in each film (from links)
  const filmToActors = new Map();
  GRAPH_DATA.links.forEach(link => {
    // Links may have source/target as strings or objects; normalize to strings
    const source = typeof link.source === 'string' ? link.source : link.source.id;
    const target = typeof link.target === 'string' ? link.target : link.target.id;

    if (!filmToActors.has(source)) filmToActors.set(source, []);
    if (!filmToActors.has(target)) filmToActors.set(target, []);
    // Add the actor color to target
    const colors = filmToActors.get(target);
    if (!colors.includes(link.color)) colors.push(link.color);
    // Add the actor color to source
    const srcColors = filmToActors.get(source);
    if (!srcColors.includes(link.color)) srcColors.push(link.color);
  });

  GRAPH_DATA.nodes.forEach(film => {
    const colors = filmToActors.get(film.id) || [];
    filmActorChains.set(film.id, colors);
    const color = colors.length > 0 ? colors[0] : '#d1d5db';
    filmColors.set(film.id, color);
  });

  // Shared film rings (for multi-colored visualization)
  node.filter(d => d.shared)
    .each(function(d) {
      const colors = filmActorChains.get(d.id) || [];
      if (colors.length > 1) {
        // Draw concentric rings for each actor color
        const ringStep = 2.5;
        colors.forEach((color, i) => {
          d3.select(this).append('circle')
            .attr('class', 'node-ring')
            .attr('r', 6 + (i * ringStep))
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 1.5)
            .attr('opacity', 0.6);
        });
      }
    });

  // Node circles (all film nodes)
  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', 6)
    .attr('fill', d => filmColors.get(d.id) || '#d1d5db')
    .attr('stroke', d => {
      const color = filmColors.get(d.id);
      if (!color) return 'rgba(100, 150, 255, 0.5)';
      // Make stroke semi-transparent version of fill color
      return color + 'cc';
    })
    .attr('stroke-width', 2)
    .on('mouseenter', function(e, d) {
      tooltip.textContent = `${d.title} (${d.year})`;
      tooltip.style.display = 'block';
      const rect = e.target.getBoundingClientRect();
      const left = Math.round(rect.left + rect.width / 2);
      const top = Math.round(rect.top - 30);
      tooltip.style.left = (left - tooltip.offsetWidth / 2) + 'px';
      tooltip.style.top = top + 'px';
    })
    .on('mouseleave', function() {
      tooltip.style.display = 'none';
    });

  // No node labels (all nodes are films, and labels would clutter the graph)

  // Drag behavior
  const drag = d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended);

  node.call(drag);

  function dragstarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(e, d) {
    d.fx = e.x;
    d.fy = e.y;
  }

  function dragended(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  // Zoom behavior
  const zoom = d3.zoom()
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoom);

  // Update positions on simulation tick (batched with RAF for performance)
  let frameScheduled = false;
  simulation.on('tick', () => {
    if (!frameScheduled) {
      frameScheduled = true;
      requestAnimationFrame(() => {
        link
          .attr('x1', d => Math.round(d.source.x))
          .attr('y1', d => Math.round(d.source.y))
          .attr('x2', d => Math.round(d.target.x))
          .attr('y2', d => Math.round(d.target.y));

        node.attr('transform', d => `translate(${Math.round(d.x)},${Math.round(d.y)})`);
        frameScheduled = false;
      });
    }
  });
</script>
